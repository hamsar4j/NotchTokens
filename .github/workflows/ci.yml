name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: swift-format lint
        run: |
          xcrun swift format lint --strict --recursive \
            --configuration .swift-format NotchTokens NotchTokensTests

      - name: Build & test (Debug)
        run: |
          xcodebuild test \
            -scheme NotchTokens \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult

      - name: Build (Release)
        run: |
          xcodebuild build \
            -scheme NotchTokens \
            -configuration Release \
            -destination 'platform=macOS'
